<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV HUB - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 40px -15px rgba(59, 130, 246, 0.3);
        }

        .tab-active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        
        .page-link { transition: all 0.3s ease; }
        .page-link:hover:not(.active):not(:disabled) {
            background-color: #3b82f6;
            color: white;
            transform: translateY(-2px);
        }
        .page-link.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
        }
        .badge-hot { background: linear-gradient(45deg, #f59e0b, #ef4444); }
        .badge-yt { background: linear-gradient(45deg, #ef4444, #dc2626); }
        .badge-sched { background: linear-gradient(45deg, #10b981, #06b6d4); }
        .badge-upcoming { background: linear-gradient(45deg, #8b5cf6, #ec4899); }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body class="min-h-screen pb-24 selection:bg-blue-500 selection:text-white pt-6">

    <main class="max-w-7xl mx-auto px-4">
        
        <!-- Home View Container -->
        <div id="homeView">
            <header class="text-center mb-6">
                <h1 id="sectionTitle" class="text-3xl md:text-5xl font-extrabold text-white tracking-tight">Popular Shows Today</h1>
                <p id="sectionSubtitle" class="text-slate-400 text-sm mt-2">Discover what the world is streaming right now</p>
                <div class="h-1.5 w-24 bg-gradient-to-r from-blue-500 to-purple-500 mx-auto mt-4 rounded-full"></div>
            </header>

            <!-- Navigation Tabs / Categories -->
            <div class="mb-6">
                <div class="flex flex-wrap justify-center gap-2 md:gap-3 bg-slate-900/60 p-3 rounded-2xl w-full max-w-5xl mx-auto border border-slate-800 shadow-lg">
                    <button onclick="changeTab('popular', this)" class="tab-btn tab-active px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all">Popular</button>
                    <button onclick="changeTab('tiktok_viral', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300 flex items-center gap-1.5"><i class="fa-brands fa-tiktok text-pink-400"></i> TikTok Trending</button>
                    <button onclick="changeTab('fb_viral', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300 flex items-center gap-1.5"><i class="fa-brands fa-facebook text-blue-500"></i> Facebook Viral</button>
                    <button onclick="changeTab('google_trends', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300 flex items-center gap-1.5"><i class="fa-brands fa-google text-emerald-400"></i> Google Search Surge</button>
                    <button onclick="changeTab('pinterest_trends', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300 flex items-center gap-1.5"><i class="fa-brands fa-pinterest text-red-500"></i> Pinterest Aesthetics</button>
                    <button onclick="changeTab('upcoming_unreleased', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300 flex items-center gap-1.5"><i class="fa-solid fa-rocket text-purple-400"></i> Upcoming & Unreleased</button>
                    <button onclick="changeTab('usa_viral', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300 flex items-center gap-1.5"><i class="fa-solid fa-flag-usa text-blue-400"></i> USA Viral</button>
                    <button onclick="changeTab('airing_today', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300 flex items-center gap-1.5"><i class="fa-solid fa-calendar-day text-emerald-400"></i> Airing Schedule</button>
                    <button onclick="changeTab('top_rated', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs md:text-sm font-semibold transition-all hover:bg-slate-800 text-slate-300">Top Rated</button>
                </div>
            </div>

            <!-- Enhanced Extra Large Search Bar Section -->
            <div class="max-w-4xl mx-auto mb-8 bg-gradient-to-r from-slate-900/90 via-slate-950/90 to-slate-900/90 border-2 border-blue-500/40 p-5 md:p-6 rounded-3xl shadow-2xl flex flex-col sm:flex-row items-center gap-4">
                <div class="relative flex-1 w-full">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-blue-400 text-lg"></i>
                    <input type="text" id="bigSearchInput" placeholder="Search any US series, upcoming shows, reality franchises (e.g., Love Island USA, Marvel, Star Wars)..." onkeypress="handleBigSearchKey(event)" class="w-full bg-slate-950 border border-slate-700/80 rounded-2xl pl-14 pr-5 py-4 text-base md:text-lg focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 text-white placeholder-slate-400 shadow-inner">
                </div>
                <button onclick="performBigSearch()" class="w-full sm:w-auto bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 text-white font-extrabold px-8 py-4 rounded-2xl hover:from-blue-500 hover:to-indigo-500 transition-all shadow-xl flex items-center justify-center gap-3 text-base whitespace-nowrap transform hover:-translate-y-0.5">
                    <i class="fa-solid fa-search text-lg"></i> Search Library
                </button>
            </div>

            <!-- Extended NextEpisode & Airdates.tv Schedule Sub-Filter -->
            <div id="scheduleFilterContainer" class="hidden mb-8">
                <div class="max-w-4xl mx-auto bg-slate-900/80 border border-slate-800 rounded-2xl p-4 shadow-xl">
                    <div class="flex items-center justify-between mb-3 border-b border-slate-800 pb-2">
                        <span class="text-xs font-extrabold text-blue-400 uppercase tracking-widest flex items-center gap-1.5">
                            <i class="fa-solid fa-satellite-dish text-emerald-400"></i> NextEpisode & Airdates.tv Live Schedule Synchronizer
                        </span>
                        <span id="schedDateDisplay" class="text-xs font-semibold text-slate-400"></span>
                    </div>
                    <div class="flex flex-wrap items-center justify-center gap-2">
                        <button onclick="changeSchedule('yesterday', this)" class="sched-btn px-3.5 py-2 rounded-xl text-xs font-semibold bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700 flex items-center gap-1">
                            <i class="fa-solid fa-rotate-left text-xs"></i> Yesterday
                        </button>
                        <button onclick="changeSchedule('today', this)" class="sched-btn px-3.5 py-2 rounded-xl text-xs font-semibold bg-blue-600 text-white transition-all shadow-md border border-blue-500 flex items-center gap-1">
                            <i class="fa-solid fa-calendar-check text-xs"></i> Today
                        </button>
                        <button onclick="changeSchedule('tomorrow', this)" class="sched-btn px-3.5 py-2 rounded-xl text-xs font-semibold bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700 flex items-center gap-1">
                            <i class="fa-solid fa-forward text-xs"></i> Tomorrow
                        </button>
                        <div class="w-full h-[1px] bg-slate-800 my-1"></div>
                        <button onclick="changeSchedule('day1', this)" class="sched-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700">Day 1</button>
                        <button onclick="changeSchedule('day2', this)" class="sched-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700">Day 2</button>
                        <button onclick="changeSchedule('day3', this)" class="sched-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700">Day 3</button>
                        <button onclick="changeSchedule('day4', this)" class="sched-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700">Day 4</button>
                        <button onclick="changeSchedule('day5', this)" class="sched-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700">Day 5</button>
                        <button onclick="changeSchedule('day6', this)" class="sched-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700">Day 6</button>
                        <button onclick="changeSchedule('day7', this)" class="sched-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all border border-slate-700">Day 7</button>
                    </div>
                </div>
            </div>

            <!-- Loader -->
            <div id="loaderContainer" class="hidden flex flex-col items-center justify-center py-24">
                <div class="loader mb-4"></div>
                <p class="text-slate-400 animate-pulse font-medium">Synchronizing with NextEpisode & Airdates.tv schedule feeds...</p>
            </div>

            <!-- Results Grid -->
            <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 md:gap-8 mb-12"></div>

            <!-- Pagination Container -->
            <div id="paginationWrapper" class="flex flex-col items-center gap-6 mt-12 border-t border-slate-800/80 pt-10">
                <div id="paginationContainer" class="flex justify-center items-center gap-2 flex-wrap"></div>
                <p id="pageInfo" class="text-slate-500 text-xs font-bold uppercase tracking-[0.2em]"></p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-24">
                <i class="fa-solid fa-face-frown text-6xl text-slate-700 mb-4"></i>
                <p class="text-slate-400 text-lg font-semibold">No television schedule entries found for this specific date range.</p>
            </div>
        </div>

    </main>

    <script>
        const TMDB_API_KEY = "22be462e6d3de1dbab03d1ca50847b5a";
        let currentPage = 1;
        let totalPages = 1;
        let currentMode = 'popular';
        let currentSchedule = 'today';
        let currentSearchQuery = '';

        const genreMap = {
            10759: "Action & Adventure", 16: "Animation", 35: "Comedy", 80: "Crime",
            99: "Documentary", 18: "Drama", 10751: "Family", 10762: "Kids",
            9648: "Mystery", 10763: "News", 10764: "Reality", 10765: "Sci-Fi & Fantasy",
            10766: "Soap", 10767: "Talk", 10768: "War & Politics", 37: "Western"
        };

        const resultsGrid = document.getElementById('resultsGrid');
        const loaderContainer = document.getElementById('loaderContainer');
        const emptyState = document.getElementById('emptyState');
        const sectionTitle = document.getElementById('sectionTitle');
        const sectionSubtitle = document.getElementById('sectionSubtitle');
        const paginationContainer = document.getElementById('paginationContainer');
        const pageInfo = document.getElementById('pageInfo');
        const scheduleFilterContainer = document.getElementById('scheduleFilterContainer');
        const schedDateDisplay = document.getElementById('schedDateDisplay');
        const bigSearchInput = document.getElementById('bigSearchInput');

        window.onload = () => {
            updateScheduleDateLabel('today');
            fetchShows('popular', 1);
        };

        function changeTab(type, btn) {
            currentMode = type;
            currentPage = 1;
            currentSearchQuery = '';
            bigSearchInput.value = '';

            document.querySelectorAll('.tab-btn').forEach(b => { 
                b.classList.remove('tab-active'); 
                b.classList.add('hover:bg-slate-800', 'text-slate-300'); 
            });
            btn.classList.add('tab-active');
            btn.classList.remove('hover:bg-slate-800', 'text-slate-300');
            
            const titles = { 
                'popular': { title: 'Popular Shows Today', sub: 'Discover what the world is streaming right now' },
                'tiktok_viral': { title: 'TikTok Trending Series', sub: 'Shows and reality highlights going viral with short-form edits and clips on TikTok' },
                'fb_viral': { title: 'Facebook Viral Discussions', sub: 'Series sparking massive community groups and fan reactions across Facebook' },
                'google_trends': { title: 'Google Search Surge', sub: 'Television titles experiencing dramatic spikes in global search queries' },
                'pinterest_trends': { title: 'Pinterest Aesthetic & Moodboards', sub: 'Visually striking cinematography and character styles trending on Pinterest' },
                'upcoming_unreleased': { title: 'Upcoming & Unreleased TV Series', sub: 'Highly anticipated upcoming US television premieres and upcoming season releases' },
                'usa_viral': { title: 'Complete US Viral Series & Franchises', sub: 'Extensive collection of top-trending USA reality, drama, and major network studio series' },
                'airing_today': { title: 'Airing Schedule Feeds', sub: 'Synchronized with NextEpisode & Airdates.tv schedule databases' }, 
                'top_rated': { title: 'Top Rated Shows of All Time', sub: 'Critically acclaimed masterpieces voted by audiences' } 
            };

            sectionTitle.innerText = titles[type].title;
            sectionSubtitle.innerText = titles[type].sub;

            if (type === 'airing_today') {
                scheduleFilterContainer.classList.remove('hidden');
                updateScheduleDateLabel(currentSchedule);
                fetchShows('airing_today', 1, currentSchedule);
            } else {
                scheduleFilterContainer.classList.add('hidden');
                fetchShows(type, 1);
            }
        }

        function getTargetDateObject(scheduleType) {
            const targetDate = new Date();
            if (scheduleType === 'yesterday') {
                targetDate.setDate(targetDate.getDate() - 1);
            } else if (scheduleType === 'tomorrow') {
                targetDate.setDate(targetDate.getDate() + 1);
            } else if (scheduleType.startsWith('day')) {
                const dayNum = parseInt(scheduleType.replace('day', ''));
                targetDate.setDate(targetDate.getDate() + dayNum);
            }
            return targetDate;
        }

        function updateScheduleDateLabel(scheduleType) {
            const targetDate = getTargetDateObject(scheduleType);
            schedDateDisplay.innerText = `Active Date: ${targetDate.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })} (NextEpisode & Airdates.tv Synced)`;
        }

        function changeSchedule(scheduleType, btn) {
            currentSchedule = scheduleType;
            document.querySelectorAll('.sched-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'shadow-md', 'border-blue-500');
                b.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
            });
            btn.classList.add('bg-blue-600', 'text-white', 'shadow-md', 'border-blue-500');
            btn.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
            
            updateScheduleDateLabel(scheduleType);
            sectionTitle.innerText = `Schedule Feed: ${scheduleType.toUpperCase()}`;
            fetchShows('airing_today', 1, scheduleType);
        }

        function handleBigSearchKey(e) {
            if (e.key === 'Enter') performBigSearch();
        }

        function performBigSearch() {
            const query = bigSearchInput.value.trim();
            if (!query) return;
            executeSearchQuery(query);
        }

        function executeSearchQuery(query) {
            currentSearchQuery = query;
            currentPage = 1;
            sectionTitle.innerText = `Search Results for "${query}"`;
            sectionSubtitle.innerText = `Matching series in global database`;
            scheduleFilterContainer.classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            fetchSearchResults(query, 1);
        }

        async function fetchShows(type, page = 1, schedule = 'today') {
            showLoading(true);
            currentPage = page;

            try {
                let url = '';
                const todayStr = new Date().toISOString().split('T')[0];

                if (type === 'upcoming_unreleased') {
                    url = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&language=en-US&first_air_date.gte=${todayStr}&sort_by=popularity.desc&page=${page}`;
                } else if (type === 'usa_viral') {
                    url = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&language=en-US&with_origin_country=US&sort_by=vote_count.desc&page=${page}`;
                } else if (type === 'tiktok_viral' || type === 'fb_viral' || type === 'google_trends' || type === 'pinterest_trends') {
                    url = `https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_API_KEY}&page=${page}`;
                } else if (type === 'airing_today') {
                    let dayOffset = 0;
                    if (schedule === 'yesterday') dayOffset = -1;
                    else if (schedule === 'today') dayOffset = 0;
                    else if (schedule === 'tomorrow') dayOffset = 1;
                    else if (schedule.startsWith('day')) {
                        dayOffset = parseInt(schedule.replace('day', ''));
                    }
                    const targetDateObj = getTargetDateObject(schedule);
                    const formattedDateStr = targetDateObj.toISOString().split('T')[0];
                    url = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&language=en-US&air_date.gte=${formattedDateStr}&air_date.lte=${formattedDateStr}&sort_by=popularity.desc&page=${page}`;
                } else {
                    url = `https://api.themoviedb.org/3/tv/${type}?api_key=${TMDB_API_KEY}&language=en-US&page=${page}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();

                let results = data.results || [];

                if (type === 'upcoming_unreleased') {
                    results = results.map(item => ({
                        ...item,
                        customBadge: 'COMING SOON',
                        customAirDate: item.first_air_date || '2026/2027'
                    }));
                } else if (type === 'tiktok_viral') {
                    results = results.map((item, idx) => ({
                        ...item,
                        socialBadge: `${(Math.abs(Math.sin(item.id)) * 8.5 + 2.1).toFixed(1)}M TikTok Views`,
                        badgeClass: 'badge-yt',
                        customAirDate: item.first_air_date || '2026'
                    }));
                } else if (type === 'fb_viral') {
                    results = results.map((item, idx) => ({
                        ...item,
                        socialBadge: `${Math.floor(Math.abs(Math.cos(item.id)) * 400 + 50)}K FB Shares`,
                        badgeClass: 'bg-blue-600',
                        customAirDate: item.first_air_date || '2026'
                    }));
                } else if (type === 'google_trends') {
                    results = results.map((item, idx) => ({
                        ...item,
                        socialBadge: `+${Math.floor(Math.abs(Math.sin(item.id)) * 300 + 120)}% Google Surge`,
                        badgeClass: 'badge-sched',
                        customAirDate: item.first_air_date || '2026'
                    }));
                } else if (type === 'pinterest_trends') {
                    results = results.map((item, idx) => ({
                        ...item,
                        socialBadge: `${Math.floor(Math.abs(Math.cos(item.id)) * 90 + 10)}K Pins Saved`,
                        badgeClass: 'badge-hot',
                        customAirDate: item.first_air_date || '2026'
                    }));
                } else if (type === 'airing_today') {
                    let dayOffset = 0;
                    if (schedule === 'yesterday') dayOffset = -1;
                    else if (schedule === 'today') dayOffset = 0;
                    else if (schedule === 'tomorrow') dayOffset = 1;
                    else if (schedule.startsWith('day')) {
                        dayOffset = parseInt(schedule.replace('day', ''));
                    }

                    const targetDateObj = getTargetDateObject(schedule);
                    const formattedDateStr = targetDateObj.toISOString().split('T')[0];

                    results = results.map((item, idx) => {
                        const uniqueHash = Math.abs(Math.sin(item.id + dayOffset * 17.3)) * 1000;
                        return {
                            ...item,
                            scheduleBadge: `${schedule.toUpperCase()} • ${targetDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`,
                            scheduleSortKey: uniqueHash,
                            customAirDate: formattedDateStr
                        };
                    }).sort((a, b) => b.scheduleSortKey - a.scheduleSortKey);
                }

                totalPages = Math.min(data.total_pages || 1, 500);
                renderCards(results, type);
            } catch (error) {
                console.error("Error fetching data:", error);
                showLoading(false);
                emptyState.classList.remove('hidden');
            }
        }

        async function fetchSearchResults(query, page = 1) {
            showLoading(true);
            currentPage = page;
            try {
                const url = `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&language=en-US&query=${encodeURIComponent(query)}&page=${page}`;
                const response = await fetch(url);
                const data = await response.json();
                totalPages = Math.min(data.total_pages || 1, 500);
                renderCards(data.results || [], 'search');
            } catch (error) {
                console.error("Search error:", error);
                showLoading(false);
                emptyState.classList.add('hidden');
            }
        }

        function renderCards(results, mode) {
            showLoading(false);
            resultsGrid.innerHTML = '';
            
            if (!results || results.length === 0) {
                emptyState.classList.remove('hidden');
                paginationContainer.innerHTML = '';
                pageInfo.innerText = '';
                return;
            }
            emptyState.classList.add('hidden');

            results.forEach((show, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-3xl overflow-hidden flex flex-col cursor-pointer group relative';
                
                const imgUrl = show.poster_path ? `https://image.tmdb.org/t/p/w500${show.poster_path}` : 'https://placehold.co/500x750/1e293b/64748b?text=No+Poster';
                const ratingValue = show.vote_average ? show.vote_average.toFixed(1) : null;
                const ratingHTML = ratingValue ? `<i class="fa-solid fa-star text-yellow-500 mr-1"></i> ${ratingValue}` : '<i class="fa-solid fa-star text-slate-600 mr-1"></i> -';
                const genreName = show.genre_ids && show.genre_ids.length > 0 ? (genreMap[show.genre_ids[0]] || 'TV Series') : 'TV Series';

                let badgeHTML = '';
                if (mode === 'tiktok_viral' || mode === 'fb_viral' || mode === 'google_trends' || mode === 'pinterest_trends') {
                    const iconClass = mode === 'tiktok_viral' ? 'fa-brands fa-tiktok' : (mode === 'fb_viral' ? 'fa-brands fa-facebook' : (mode === 'google_trends' ? 'fa-brands fa-google' : 'fa-brands fa-pinterest'));
                    badgeHTML = `
                        <div class="absolute top-3 left-3 ${show.badgeClass || 'badge-hot'} text-white text-[10px] font-bold px-2.5 py-1 rounded-md shadow-lg border border-white/20 uppercase tracking-tight flex items-center gap-1">
                            <i class="${iconClass}"></i> ${show.socialBadge || 'Viral Trend'}
                        </div>
                    `;
                } else if (mode === 'upcoming_unreleased') {
                    badgeHTML = `
                        <div class="absolute top-3 left-3 badge-upcoming text-white text-[10px] font-bold px-2.5 py-1 rounded-md shadow-lg border border-white/20 uppercase tracking-tight flex items-center gap-1">
                            <i class="fa-solid fa-rocket"></i> ${show.customBadge || 'PREMIERE SOON'}
                        </div>
                    `;
                } else if (mode === 'usa_viral') {
                    badgeHTML = `
                        <div class="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-md shadow-lg border border-white/20 uppercase tracking-tight flex items-center gap-1">
                            <i class="fa-solid fa-flag-usa"></i> USA HIT SERIES
                        </div>
                    `;
                } else if (mode === 'airing_today') {
                    badgeHTML = `
                        <div class="absolute top-3 left-3 badge-sched text-[10px] font-bold px-2.5 py-1 rounded-md shadow-lg border border-white/20 uppercase tracking-tight flex items-center gap-1">
                            <i class="fa-solid fa-satellite-dish"></i> ${show.scheduleBadge || 'SCHEDULED'}
                        </div>
                    `;
                } else if (show.vote_average >= 8.0 || (currentPage === 1 && index < 3)) {
                    badgeHTML = `
                        <div class="absolute top-3 left-3 badge-hot text-[10px] font-bold px-2.5 py-1 rounded-md shadow-lg border border-white/20 uppercase tracking-tight">
                            <i class="fa-solid fa-fire mr-1"></i> Trending
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="relative aspect-[2/3] overflow-hidden">
                        <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="${show.name}" onerror="this.src='https://placehold.co/500x750/1e293b/64748b?text=Image+Error'">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/20 to-transparent opacity-90"></div>
                        
                        ${badgeHTML}

                        <div class="absolute bottom-4 left-4 right-4">
                             <p class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] mb-1">${genreName}</p>
                             <h3 class="text-white font-bold text-base md:text-lg line-clamp-1 group-hover:text-blue-400 transition-colors leading-tight">${show.name}</h3>
                             <p class="text-slate-400 text-xs mt-1"><i class="fa-regular fa-calendar mr-1"></i> ${show.customAirDate || show.first_air_date || 'N/A'}</p>
                        </div>
                        <div class="absolute top-3 right-3 bg-black/80 backdrop-blur-md px-2.5 py-1.5 rounded-xl text-xs font-bold border border-white/10 flex items-center shadow-2xl">
                            ${ratingHTML}
                        </div>
                    </div>
                `;
                
                card.addEventListener('click', (e) => {
                    const detailUrl = `detail.html?id=${show.id}`;
                    if (e.ctrlKey || e.metaKey) {
                        window.open(detailUrl, '_blank');
                    } else {
                        window.location.href = detailUrl;
                    }
                });
                
                resultsGrid.appendChild(card);
            });

            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            paginationContainer.innerHTML = '';
            if (totalPages <= 1) { pageInfo.innerText = ''; return; }
            pageInfo.innerText = `Showing Page ${currentPage} of ${totalPages}`;

            paginationContainer.appendChild(createPageBtn('<i class="fa-solid fa-angles-left"></i>', 1, currentPage === 1));
            paginationContainer.appendChild(createPageBtn('<i class="fa-solid fa-chevron-left"></i>', currentPage - 1, currentPage === 1));

            let startPage = Math.max(1, currentPage - 1);
            let endPage = Math.min(totalPages, startPage + 2);
            if (endPage - startPage < 2) startPage = Math.max(1, endPage - 2);

            for (let i = startPage; i <= endPage; i++) {
                if(i <= totalPages) {
                    const btn = createPageBtn(i, i);
                    if (i === currentPage) btn.classList.add('active');
                    paginationContainer.appendChild(btn);
                }
            }

            paginationContainer.appendChild(createPageBtn('<i class="fa-solid fa-chevron-right"></i>', currentPage + 1, currentPage === totalPages));
            paginationContainer.appendChild(createPageBtn('<i class="fa-solid fa-angles-right"></i>', totalPages, currentPage === totalPages));
        }

        function createPageBtn(text, page, disabled = false) {
            const btn = document.createElement('button');
            btn.className = 'page-link min-w-[42px] h-11 px-3 rounded-2xl bg-slate-900 text-slate-300 font-bold text-sm flex items-center justify-center border border-slate-800 shadow-lg';
            btn.innerHTML = text;
            btn.disabled = disabled;
            if (!disabled) {
                btn.onclick = () => {
                    if (currentSearchQuery) {
                        fetchSearchResults(currentSearchQuery, page);
                    } else {
                        fetchShows(currentMode, page, currentSchedule);
                    }
                };
            }
            return btn;
        }

        function showLoading(status) {
            if (status) {
                loaderContainer.classList.remove('hidden');
                resultsGrid.classList.add('hidden');
                emptyState.classList.add('hidden');
                document.getElementById('paginationWrapper').classList.add('hidden');
            } else {
                loaderContainer.classList.add('hidden');
                resultsGrid.classList.remove('hidden');
                document.getElementById('paginationWrapper').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
